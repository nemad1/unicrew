version: '3.8'
services:
  openwa-api:
    image: ghcr.io/rmyndharis/openwa:latest
    restart: unless-stopped
    ports:
      - "2785:2785"
    environment:
      - WA_API_KEY=${WA_API_KEY}
      - ENGINE_TYPE=baileys
      - STORAGE_TYPE=local
      - DATABASE_TYPE=sqlite
    volumes:
      - openwa-data:/app/data

volumes:
  openwa-data:
